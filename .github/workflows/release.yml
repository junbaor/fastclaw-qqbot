name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"

      - name: Build all platforms
        run: make build-all

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            qqbot-darwin-amd64
            qqbot-darwin-arm64
            qqbot-linux-amd64
            qqbot-linux-arm64
            qqbot-windows-amd64.exe
            qqbot-windows-arm64.exe
